name: CI/CD Pipeline - Frontend Despachos

# 1. El trigger: Cuándo se ejecuta este pipeline
on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'front-despacho/**'
      - 'k8s/frontend-*.yml'  # Cambiado a .yml para que coincida con tus archivos reales

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    # 2. Autenticación en AWS usando tus GitHub Secrets
    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # 3. Conexión a tu registro de contenedores (ECR)
    - name: Iniciar sesión en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Construir y subir la imagen (Build & Push) con inyección de Secret
    - name: Build, tag, y push de la imagen a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tienda-frontend
        IMAGE_TAG: latest
      run: |
        cd front-despacho
        # MODIFICACIÓN AQUÍ: Pasamos la URL secreta del Ingress en el momento del build
        docker build \
          --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Conexión al clúster de Kubernetes
    - name: Actualizar Kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name tienda-eks

    # 6. Despliegue en Kubernetes (Deploy)
    - name: Desplegar en EKS
      run: |
        kubectl apply -f k8s/frontend-deployment.yml
        kubectl apply -f k8s/frontend-service.yml
        
        # Forzar el reinicio para asegurar que tome la última imagen con la nueva URL
        kubectl rollout restart deployment frontend-despacho