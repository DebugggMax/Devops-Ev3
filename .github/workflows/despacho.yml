name: CI/CD Pipeline - Backend Despachos

# 1. El trigger: Cuándo se ejecuta este pipeline
on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'back-despachos-springboot/**'
      - 'k8s/backend-despachos-*.yaml'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    # 2. Autenticación en AWS usando tus GitHub Secrets
    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # 3. Conexión a tu registro de contenedores (ECR)
    - name: Iniciar sesión en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Construir y subir la imagen (Build & Push)
    - name: Build, tag, y push de la imagen a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        # IMPORTANTE: Este nombre debe coincidir con el repo que creó Terraform
        ECR_REPOSITORY: tienda-despachos
        IMAGE_TAG: latest
      run: |
        cd back-despachos-springboot/api-rest-despacho
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Conexión al clúster de Kubernetes
    - name: Actualizar Kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name tienda-eks

    # 6. Despliegue en Kubernetes (Deploy)
    - name: Desplegar en EKS
      run: |
        kubectl apply -f k8s/backend-despachos-deployment.yaml
        kubectl apply -f k8s/backend-despachos-service.yaml
        
        # Opcional: Forzar el reinicio para asegurar que tome la última imagen
        kubectl rollout restart deployment backend-despachos