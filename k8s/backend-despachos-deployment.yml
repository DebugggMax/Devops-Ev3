apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-despachos
  template:
    metadata:
      labels:
        app: backend-despachos
    spec:
      containers:
      - name: backend-despachos
        image: tu-cuenta.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
        ports:
        - containerPort: 8081
        env:
        - name: DB_ENDPOINT
          value: "mysql-svc"  # Apunta al nombre del Service de arriba
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "innovatech_db"
        - name: DB_USERNAME
          value: "root"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password